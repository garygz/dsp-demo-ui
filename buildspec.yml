version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      # VITE_API_BASE_URL and VITE_SENTRY_DSN are injected by CodeBuild environment
      # variables and override anything in .env.production at Vite build time.
      - npm run build

  post_build:
    commands:
      # Hashed asset files (JS/CSS bundles) — immutable, cache for 1 year in the browser
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --delete \
          --exclude "index.html" \
          --cache-control "public,max-age=31536000,immutable"

      # index.html — never cache so users always get the latest app shell
      - |
        aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
          --cache-control "no-cache,no-store,must-revalidate" \
          --content-type "text/html"

artifacts:
  files:
    - "**/*"
  base-directory: dist
